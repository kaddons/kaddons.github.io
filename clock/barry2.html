<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Time & Date & Weather Display with Analog Clock</title>
<link rel="icon" href="https://img.icons8.com/?size=16&id=113106&format=png" />
<style>
body {
  margin: 0;
  padding: 0;
  height: 100vh;
  background-color: black;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  color: dimgray;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: start;
  overflow: hidden;
}
#header { display: flex; flex-direction: column; align-items: center; justify-content: center; }
#analogClock { width: 150px; height: 150px; margin-top: 0.7vh; }
#time { font-size: clamp(5rem, 10vw, 8rem); display: flex; align-items: baseline; margin-top: 1vh; }
#time span { display: inline-block; }
#time .normal-colon { font-size: 1em; }
#time .small-colon { font-size: 0.4em; margin: 0 0.2em; }
#seconds { font-size: 0.6em; }
#ampm { font-size: 0.4em; margin-left: 0.2em; }
#date { font-size: clamp(1rem, 2.5vw, 1.3rem); margin-top: 1.5vh; text-align: center; }
#main-content { display: flex; flex-direction: row; align-items: flex-start; justify-content: center; width: 100%; max-width: 1800px; padding: 20px; }
#location-weather { display: flex; flex-direction: column; align-items: center; margin-top: 20px; margin-right: 30px; text-align: center; }
#location { font-weight: bold; font-size: 1.3em; }
#todays-weather { font-size: 1.3em; display: flex; flex-direction: column; align-items: center; }
.weather-background { background: #202020; padding: 4px; border-radius: 6px; margin-top: 8px; display: flex; flex-direction: column; align-items: center; width: 110px; height: 115px; justify-content: center; }
#weather-icon { margin-top: -10px; width: 90px; height: 90px; }
#temperature { margin-top: 5px; font-size: 0.9em; color: dimgray; text-align: center; }
#forecast-container { display: flex; flex-direction: column; align-items: center; width: 100%; margin-top: 0px; flex: 0; }
.forecast-row { display: flex; flex-direction: row; justify-content: center; overflow-x: auto; padding: 10px 0; width: 100%; white-space: nowrap; }
.forecast-item { min-width: 80px; background: #202020; color: dimgray; padding: 6px; border-radius: 6px; margin-right: 5px; text-align: center; font-size: 0.8em; display: inline-block; }
@media (min-width: 1920px) { body { justify-content: start; } }
</style>
</head>
<body>

<div id="header">
  <canvas id="analogClock" width="200" height="200"></canvas>
  <div id="time">
    <span id="hours">--</span>
    <span class="normal-colon">:</span>
    <span id="minutes">--</span>
    <span class="small-colon">:</span>
    <span id="seconds">--</span>
    <span id="ampm">AM</span>
  </div>
  <div id="date">Loading...</div>
</div>

<div id="main-content">
  <div id="location-weather">
    <div id="location">Loading location...</div>
    <div id="todays-weather">
      <div>Current Weather</div>
	<div class="weather-background" id="weather-background">
  	<div id="temperature"></div>
  	<img id="weather-icon" src="" alt="Weather Icon" />
  	<div id="weather-name" style="margin-top: -10px; font-size:0.9em; color:dimgray;"></div>
	</div>
    </div>
  </div>
  <div id="forecast-container">
    <div id="hourly-forecast" class="forecast-row"></div>
    <div id="weekly-forecast" class="forecast-row"></div>
  </div>
</div>

<script>
  // --- Clock functions ---
  const body = document.body;
  let fadeInitiated = false;

  function fadeOut() {
    return new Promise((resolve) => {
      body.style.transition = 'opacity 3s ease-in-out';
      body.style.opacity = 0;
      setTimeout(resolve, 3000);
    });
  }
  function fadeIn() {
    return new Promise((resolve) => {
      body.style.transition = 'opacity 3s ease-in-out';
      body.style.opacity = 1;
      setTimeout(resolve, 3000);
    });
  }
  async function handleFadeCycle() {
    await fadeOut();
    updateClock();
    await fadeIn();
  }

  const canvas = document.getElementById('analogClock');
  const ctx = canvas.getContext('2d');
  const radius = 100;

  function drawClock() {
    const now = new Date();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.beginPath();
    ctx.arc(radius, radius, radius - 10, 0, 2 * Math.PI);
    ctx.strokeStyle = 'dimgray';
    ctx.lineWidth = 4;
    ctx.stroke();

    // --- Clock face markings ---
    for (let i=0; i<60; i++) {
      if (i % 5 !== 0) continue;
      const angle = (i * Math.PI) / 30;
      let innerRadius = radius - 25;
      let outerRadius = radius - 9;
      if (i % 15 === 0) {
        innerRadius = radius - 30;
        outerRadius = radius - 9;
      }
      ctx.lineWidth = i % 15 === 0 ? 5 : 3;
      ctx.strokeStyle = 'dimgray';
      ctx.beginPath();
      ctx.moveTo(
        radius + Math.cos(angle - Math.PI/2) * innerRadius,
        radius + Math.sin(angle - Math.PI/2) * innerRadius
      );
      ctx.lineTo(
        radius + Math.cos(angle - Math.PI/2) * outerRadius,
        radius + Math.sin(angle - Math.PI/2) * outerRadius
      );
      ctx.stroke();
    }

    for (let i=0; i<60; i++) {
      if (i % 5 === 0) continue;
      const angle = (i * Math.PI) / 30;
      const innerRadius = radius - 20;
      const outerRadius = radius - 12;
      ctx.lineWidth = 1;
      ctx.strokeStyle = 'dimgray';
      ctx.beginPath();
      ctx.moveTo(
        radius + Math.cos(angle - Math.PI/2) * innerRadius,
        radius + Math.sin(angle - Math.PI/2) * innerRadius
      );
      ctx.lineTo(
        radius + Math.cos(angle - Math.PI/2) * outerRadius,
        radius + Math.sin(angle - Math.PI/2) * outerRadius
      );
      ctx.stroke();
    }

    const seconds = now.getSeconds();
    const minutes = now.getMinutes();
    const hours = now.getHours();

    const secondAngle = (seconds * Math.PI) / 30;
    const minuteAngle = (minutes * Math.PI) / 30 + (secondAngle / 60);
    const hourAngle = ((hours % 12) + minutes / 60) * (Math.PI / 6);

    ctx.lineWidth = 6;
    ctx.strokeStyle='dimgray';
    ctx.beginPath();
    ctx.moveTo(radius, radius);
    ctx.lineTo(
      radius + Math.cos(hourAngle - Math.PI/2) * (radius - 60),
      radius + Math.sin(hourAngle - Math.PI/2) * (radius - 60)
    );
    ctx.stroke();

    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.moveTo(radius, radius);
    ctx.lineTo(
      radius + Math.cos(minuteAngle - Math.PI/2) * (radius - 40),
      radius + Math.sin(minuteAngle - Math.PI/2) * (radius - 40)
    );
    ctx.stroke();

    ctx.lineWidth=2;
    ctx.strokeStyle='red';
    ctx.beginPath();
    ctx.moveTo(radius, radius);
    ctx.lineTo(
      radius + Math.cos(secondAngle - Math.PI/2) * (radius -20),
      radius + Math.sin(secondAngle - Math.PI/2) * (radius -20)
    );
    ctx.stroke();
  }

  function updateClock() {
    const now=new Date();
    let hours=now.getHours();
    const minutes=now.getMinutes();
    const seconds=now.getSeconds();
    const ampm=hours>=12?'PM':'AM';
    hours=hours%12||12;

    document.getElementById('hours').textContent=hours;
    document.getElementById('minutes').textContent=String(minutes).padStart(2,'0');
    document.getElementById('seconds').textContent=String(seconds).padStart(2,'0');
    document.getElementById('ampm').textContent=ampm;

    // Date formatting code
    const days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    const months=["January","February","March","April","May","June","July","August","September","October","November","December"];
    const dayName=days[now.getDay()];
    const day=now.getDate();
    const month=months[now.getMonth()];
    const year=now.getFullYear();

    function getOrdinal(n){ if(n>3 && n<21) return 'th'; switch(n%10){ case 1: return 'st'; case 2: return 'nd'; case 3: return 'rd'; default: return 'th'; } }

    const dateString=`${dayName} ${day}${getOrdinal(day)} ${month} ${year}`;
    document.getElementById('date').textContent=dateString;

    drawClock();

    if (seconds===57 && !fadeInitiated) {
      fadeInitiated=true;
      handleFadeCycle().then(()=>{ fadeInitiated=false; });
    }
  }
  setInterval(updateClock, 1000);
  updateClock();

// -------------------- WEATHER --------------------
const lat = 51.4066;
const lon = -3.2834;
document.getElementById('location').textContent='Barry, UK';

function getWeatherName(code) {
  const names = {
    0: "Clear",
    1: "Partly Cloudy",
    2: "Cloudy",
    3: "Overcast",
    45: "Mist",
    48: "Fog",
    51: "Drizzle",
    53: "Drizzle",
    55: "Drizzle",
    61: "Rain",
    63: "Rain",
    65: "Rain",
    71: "Snow",
    73: "Snow",
    75: "Snow",
    80: "Rain Showers",
    81: "Rain Showers",
    82: "Rain Showers"
  };
  return names[code] || "Unknown";
}

function getIconUrl(code, isDay){
  const icons={
    0:isDay?'https://cdn.meteocons.com/3.0.0-next.10/svg/fill/clear-day.svg':'https://cdn.meteocons.com/3.0.0-next.10/svg/fill/clear-night.svg',
    1:isDay?'https://cdn.meteocons.com/3.0.0-next.10/svg/fill/partly-cloudy-day.svg':'https://cdn.meteocons.com/3.0.0-next.10/svg/fill/partly-cloudy-night.svg',
    2:'https://cdn.meteocons.com/3.0.0-next.10/svg/fill/cloudy.svg',
    3:'https://cdn.meteocons.com/3.0.0-next.10/svg/fill/cloudy.svg',
    45:'https://cdn.meteocons.com/3.0.0-next.10/svg/fill/mist.svg',
    48:'https://cdn.meteocons.com/3.0.0-next.10/svg/fill/fog.svg',
    51:'https://cdn.meteocons.com/3.0.0-next.10/svg/fill/drizzle.svg',
    53:'https://cdn.meteocons.com/3.0.0-next.10/svg/fill/drizzle.svg',
    55:'https://cdn.meteocons.com/3.0.0-next.10/svg/fill/drizzle.svg',
    61:'https://cdn.meteocons.com/3.0.0-next.10/svg/fill/rain.svg',
    63:'https://cdn.meteocons.com/3.0.0-next.10/svg/fill/rain.svg',
    65:'https://cdn.meteocons.com/3.0.0-next.10/svg/fill/rain.svg',
    71:'https://cdn.meteocons.com/3.0.0-next.10/svg/fill/snow.svg',
    73:'https://cdn.meteocons.com/3.0.0-next.10/svg/fill/snow.svg',
    75:'https://cdn.meteocons.com/3.0.0-next.10/svg/fill/snow.svg',
    80:'https://cdn.meteocons.com/3.0.0-next.10/svg/fill/rain.svg',
    81:'https://cdn.meteocons.com/3.0.0-next.10/svg/fill/rain.svg',
    82:'https://cdn.meteocons.com/3.0.0-next.10/svg/fill/rain.svg'
  };
  return icons[code]||(isDay?'https://cdn.meteocons.com/3.0.0-next.10/svg/fill/partly-cloudy-day.svg':'https://cdn.meteocons.com/3.0.0-next.10/svg/fill/partly-cloudy-night.svg');
}

function setWeatherIcon(imgEl,url){ imgEl.style.display='block'; imgEl.src=url; imgEl.onerror=()=>{imgEl.style.display='none';}; }

async function fetchTodayWeather(){
  try {
    const resp = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&timezone=auto`);
    const data = await resp.json();
    const code = data.current_weather.weathercode;
    const temp = Math.round(data.current_weather.temperature);
    const isDay = new Date().getHours()>=6 && new Date().getHours()<18;
    const iconUrl = getIconUrl(code,isDay);

    document.getElementById('temperature').textContent=`${temp}°C`;
    document.getElementById('weather-name').textContent = getWeatherName(code);
    setWeatherIcon(document.getElementById('weather-icon'),iconUrl);
  } catch(e) {
    console.error(e);
  }
}

async function fetchHourlyForecast() {
  try {
    const resp = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,weathercode&current_weather=true&timezone=auto`);
    const data = await resp.json();
    const now = new Date();
    const container = document.getElementById('hourly-forecast');
    container.innerHTML='';

    let hoursList = [];

    // --- Add current weather first ---
    hoursList.push({
      time: new Date(),
      temp: Math.round(data.current_weather.temperature),
      code: data.current_weather.weathercode
    });

    // --- Add next 6 hours ---
    for (let i=0; i<data.hourly.time.length && hoursList.length < 7; i++) {
      const dt = new Date(data.hourly.time[i]);
      if (dt > now) {
        hoursList.push({
          time: dt,
          temp: Math.round(data.hourly.temperature_2m[i]),
          code: data.hourly.weathercode[i]
        });
      }
    }

    // --- Render hourly forecast ---
    hoursList.forEach(h => {
      const dt = h.time;
      const hour12 = dt.getHours()%12 || 12;
      const ampm = dt.getHours() >= 12 ? 'PM' : 'AM';
      const isDay = dt.getHours() >= 6 && dt.getHours() < 18;
      const iconUrl = getIconUrl(h.code, isDay);
      const div = document.createElement('div');
      div.className='forecast-item';
      div.innerHTML = `
        <div>${hour12} ${ampm}</div>
        <div style="height:35px; display:flex; justify-content:center; align-items:center;">
          <img style="width:40px;height:40px;">
        </div>
        <div>${h.temp}°C</div>
        <div style="font-size:0.7em; color:dimgray;">${getWeatherName(h.code)}</div>
      `;
      setWeatherIcon(div.querySelector('img'), iconUrl);
      container.appendChild(div);
    });
  } catch(e){
    console.error(e);
  }
}

async function fetchWeeklyForecast(){
  try{
    const resp = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto`);
    const data = await resp.json();
    const container = document.getElementById('weekly-forecast');
    container.innerHTML='';

    for(let i=0;i<data.daily.time.length;i++){
      const dt = new Date(data.daily.time[i]);
      const dayName = dt.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'});
      const code = data.daily.weathercode[i];
      const iconUrl = getIconUrl(code,true);
      const maxTemp=Math.round(data.daily.temperature_2m_max[i]);
      const minTemp=Math.round(data.daily.temperature_2m_min[i]);
      const weatherName = getWeatherName(code); // <-- get weather description

      const div = document.createElement('div');
      div.className='forecast-item';
      div.innerHTML=`
        <div>${dayName}</div>
        <div style="height:35px; display:flex; justify-content:center; align-items:center;">
          <img style="width:40px;height:40px;">
        </div>
        <div>${maxTemp}° / ${minTemp}°</div>
        <div style="font-size:0.7em; color:dimgray; margin-top:2px;">${weatherName}</div>
      `;
      setWeatherIcon(div.querySelector('img'),iconUrl);
      container.appendChild(div);
    }
  }catch(e){ console.error(e); }
}

// Initial fetch
fetchTodayWeather();
fetchHourlyForecast();
fetchWeeklyForecast();

// Refresh intervals
setInterval(fetchTodayWeather,5*60*1000);
setInterval(fetchHourlyForecast,5*60*1000);
setInterval(fetchWeeklyForecast,60*60*1000);
</script>

</body>
</html>
