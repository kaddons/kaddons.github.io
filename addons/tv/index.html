<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TV</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #121212;
    padding: 20px;
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    color: #eee;
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
    font-size: 2rem;
  }

  #buttonsContainer {
    display: flex;
    flex-direction: column;
    width: 100%;
    max-width: 800px;
    align-items: center;
  }

  .item-row {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    width: 100%;
    margin: 10px 0;
  }

  .file-link {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 250px; /* fixed width for uniformity */
    min-height: 35px; /* enough height for 1-2 lines */
    padding: 10px;
    border-radius: 8px;
    background-color: #4CAF50;
    color: #fff;
    font-size: 1.2rem;
    font-weight: bold;
    text-align: center;
    text-decoration: none;
    margin-right: 20px;
    cursor: pointer;
    transition: 0.2s;
    word-break: break-word;
    white-space: normal;
    max-height: 3.6em; /* height for two lines with line-height 1.8em */
    line-height: 1.8em;
  }

  .file-link:hover {
    opacity: 0.9;
    transform: scale(1.02);
  }

  .info {
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .info span {
    font-size: 1.5rem;
    font-weight: bold;
  }

  /* Highlight styles */
  .highlight.updated { color: #104710; }
  .highlight.new { color: #362852; }
  .highlight.old { color: #590d0d; }

  @media(max-width: 600px){
    body { padding: 10px; }
    h1 { font-size: 1.8rem; }
    .file-link { font-size: 1rem; min-width: 150px; height: auto; line-height: 1.2em; }
    .info span { font-size: 1.2rem; }
  }
</style>
</head>
<body>

<h1>TV</h1>
<div id="instructions" style="text-align:center; margin-bottom:20px;">Loading data from JSON...</div>
<div id="buttonsContainer"></div>

<script>
window.onload = function() {
  // XMLHttpRequest ensures 100% compatibility with Android 6 + modern web browsers
  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'list.json', true);
  
  xhr.onload = function() {
    if (xhr.status >= 200 && xhr.status < 400) {
      try {
        var jsonData = JSON.parse(xhr.responseText);
        document.getElementById('instructions').style.display = 'none';

        jsonData.forEach(function(item) {
          var displayDate = item.date;
          if (!displayDate || displayDate.trim() === "") {
            displayDate = '';
          }

          var row = document.createElement('div');
          row.className = 'item-row';

          var a = document.createElement('a');
          a.className = 'file-link';
          a.innerText = item.name;
          a.href = item.url;
          
          // Intercept the click to force download text files and binaries directly
          a.onclick = function(e) {
            e.preventDefault(); 
            triggerForcedDownload(item.url, item.name);
          };

          var status = item.status.toLowerCase();
          if (status === 'updated') {
            a.style.backgroundColor = '#104710';
          } else if (status === 'new') {
            a.style.backgroundColor = '#362852';
          } else if (status === 'old') {
            a.style.backgroundColor = '#590d0d';
          }

          var infoDiv = document.createElement('div');
          infoDiv.className = 'info';
          infoDiv.innerHTML = '<span>' + displayDate + ' <span class="highlight ' + status + '">' + item.status + '</span></span>';

          row.appendChild(a);
          row.appendChild(infoDiv);
          document.getElementById('buttonsContainer').appendChild(row);
        });
      } catch (e) {
        document.getElementById('instructions').textContent = 'Error parsing JSON data.';
        console.error('Parsing Error:', e);
      }
    } else {
      document.getElementById('instructions').textContent = 'Error loading JSON file.';
    }
  };

  xhr.onerror = function() {
    document.getElementById('instructions').textContent = 'Error loading JSON file.';
  };

  xhr.send();
};

// Converts the file stream into an immediate file download
function triggerForcedDownload(fileUrl, fileName) {
  var dlXhr = new XMLHttpRequest();
  dlXhr.open('GET', fileUrl, true);
  dlXhr.responseType = 'blob'; // Forces the browser to treat the link as a download file

  dlXhr.onload = function() {
    if (dlXhr.status === 200) {
      var blob = dlXhr.response;
      
      // Fallback for older WebView engines
      if (window.navigator && window.navigator.msSaveOrOpenBlob) {
        window.navigator.msSaveOrOpenBlob(blob, fileName);
        return;
      }

      // Universal download bridge for old Android and modern platforms
      var blobUrl = window.URL.createObjectURL(blob);
      var tempLink = document.createElement('a');
      tempLink.style.display = 'none';
      tempLink.href = blobUrl;
      tempLink.download = fileName; // Enforces the filename and extensions like .txt
      
      document.body.appendChild(tempLink);
      tempLink.click();
      
      setTimeout(function() {
        document.body.removeChild(tempLink);
        window.URL.revokeObjectURL(blobUrl);
      }, 100);
    } else {
      window.location.href = fileUrl;
    }
  };

  dlXhr.onerror = function() {
    window.location.href = fileUrl;
  };

  dlXhr.send();
}
</script>

</body>
</html>
