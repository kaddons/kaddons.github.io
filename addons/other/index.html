<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Other</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #121212;
    padding: 20px;
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    color: #eee;
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
    font-size: 2rem;
  }

  #buttonsContainer {
    display: flex;
    flex-direction: column;
    width: 100%;
    max-width: 800px;
    align-items: center;
  }

  .item-row {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    width: 100%;
    margin: 10px 0;
  }

  .file-link {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 250px; /* fixed width for uniformity */
    min-height: 35px; /* enough height for 1-2 lines */
    padding: 10px;
    border-radius: 8px;
    background-color: #4CAF50;
    color: #fff;
    font-size: 1.2rem;
    font-weight: bold;
    text-align: center;
    text-decoration: none;
    margin-right: 20px;
    cursor: pointer;
    transition: 0.2s;
    word-break: break-word;
    white-space: normal;
    max-height: 3.6em; /* height for two lines with line-height 1.8em */
    line-height: 1.8em;
  }

  .file-link:hover {
    opacity: 0.9;
    transform: scale(1.02);
  }

  .info {
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .info span {
    font-size: 1.5rem;
    font-weight: bold;
  }

  /* Highlight styles */
  .highlight.updated { color: #104710; }
  .highlight.new { color: #362852; }
  .highlight.old { color: #590d0d; }

  @media(max-width: 600px){
    body { padding: 10px; }
    h1 { font-size: 1.8rem; }
    .file-link { font-size: 1rem; min-width: 150px; height: auto; line-height: 1.2em; }
    .info span { font-size: 1.2rem; }
  }
</style>
</head>
<body>

<h1>Other</h1>
<div id="instructions" style="text-align:center; margin-bottom:20px;">Loading data from JSON...</div>
<div id="buttonsContainer"></div>

<script>
window.onload = function() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'list.json', true);
  
  xhr.onload = function() {
    if (xhr.status >= 200 && xhr.status < 400) {
      try {
        var jsonData = JSON.parse(xhr.responseText);
        document.getElementById('instructions').style.display = 'none';

        jsonData.forEach(function(item) {
          var displayDate = item.date;
          if (!displayDate || displayDate.trim() === "") {
            displayDate = '';
          }

          var row = document.createElement('div');
          row.className = 'item-row';

          var a = document.createElement('a');
          a.className = 'file-link';
          a.innerText = item.name;
          a.href = item.url;
          
          // Cross-compatible script to force download on static GitHub Pages
          a.onclick = function(e) {
            e.preventDefault();
            gitHubSafeDownload(item.url);
          };

          var status = item.status.toLowerCase();
          if (status === 'updated') {
            a.style.backgroundColor = '#104710';
          } else if (status === 'new') {
            a.style.backgroundColor = '#362852';
          } else if (status === 'old') {
            a.style.backgroundColor = '#590d0d';
          }

          var infoDiv = document.createElement('div');
          infoDiv.className = 'info';
          infoDiv.innerHTML = '<span>' + displayDate + ' <span class="highlight ' + status + '">' + item.status + '</span></span>';

          row.appendChild(a);
          row.appendChild(infoDiv);
          document.getElementById('buttonsContainer').appendChild(row);
        });
      } catch (e) {
        document.getElementById('instructions').textContent = 'Error parsing JSON data.';
      }
    } else {
      document.getElementById('instructions').textContent = 'Error loading JSON file.';
    }
  };
  xhr.send();
};

// GitHub Pages-safe download dispatcher
function gitHubSafeDownload(fileUrl) {
  var isDownloaderApp = navigator.userAgent.match(/Downloader|AFTV/i) || !window.URL;
  var fileName = fileUrl.substring(fileUrl.lastIndexOf('/') + 1);
  var fileExtension = fileName.split('.').pop().toLowerCase();

  // Detect Android 6 or old WebView clients
  var isOldAndroid = false;
  var ua = navigator.userAgent;
  if (ua.indexOf("Android") > -1) {
    var androidVersion = parseFloat(ua.slice(ua.indexOf("Android") + 8));
    if (androidVersion <= 6.0) {
      isOldAndroid = true;
    }
  }

  // ==========================================
  // RULES SPECIFICALLY FOR APK FILES
  // ==========================================
  if (fileExtension === 'apk') {
    if (isDownloaderApp) {
      // 1. FOR DOWNLOADER APP: Use the pure iframe channel.
      // This forces the Downloader App's internal Android hook to fetch the file natively.
      // Once done, it immediately triggers the "Do you want to install..." panel.
      var dlFrame = document.getElementById('dlFrame');
      if (!dlFrame) {
        dlFrame = document.createElement('iframe');
        dlFrame.id = 'dlFrame';
        dlFrame.style.display = 'none';
        document.body.appendChild(dlFrame);
      }
      dlFrame.src = fileUrl;
    } else {
      // 2. FOR NORMAL BROWSERS: Trigger a clean, direct location dispatch.
      // This commands Chrome/Safari/Firefox to just download the APK silently 
      // directly into the user's storage without trying to open or interpret it.
      var modernLink = document.createElement('a');
      modernLink.href = fileUrl;
      modernLink.setAttribute('download', fileName);
      document.body.appendChild(modernLink);
      modernLink.click();
      document.body.removeChild(modernLink);
    }
    return; // Core APK execution stops here cleanly.
  }

  // ==========================================
  // RULES FOR OTHER FILES (.CONF, .EXE, NO-EXTENSION)
  // ==========================================
  fetch(fileUrl)
    .then(function(response) { return response.blob(); })
    .then(function(blob) {
      var reader = new FileReader();
      reader.onloadend = function() {
        var base64data = reader.result;
        var cleanBase64 = base64data.split(',');
        var dataUrl = 'data:application/octet-stream;headers=Content-Disposition%3Bfilename%3D' + encodeURIComponent(fileName) + ';base64,' + cleanBase64;

        if (isDownloaderApp || isOldAndroid) {
          var dlFrame = document.getElementById('dlFrame');
          if (!dlFrame) {
            dlFrame = document.createElement('iframe');
            dlFrame.id = 'dlFrame';
            dlFrame.style.display = 'none';
            document.body.appendChild(dlFrame);
          }
          dlFrame.src = dataUrl;
        } else {
          var modernLink = document.createElement('a');
          modernLink.href = dataUrl;
          modernLink.setAttribute('download', fileName);
          document.body.appendChild(modernLink);
          modernLink.click();
          document.body.removeChild(modernLink);
        }
      };
      reader.readAsDataURL(blob);
    })
    .catch(function(error) {
      // Fallback redirect map if network requests hit security limits
      var fallbackLink = document.createElement('a');
      fallbackLink.href = fileUrl;
      fallbackLink.setAttribute('download', fileName);
      document.body.appendChild(fallbackLink);
      fallbackLink.click();
      document.body.removeChild(fallbackLink);
    });
}
</script>

</body>
</html>
